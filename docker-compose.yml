services:
  db:
    image: postgres:16-alpine
    container_name: legalpermit-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: legalpermit
    ports:
      - "5432:5432"
    volumes:
      - legalpermit_pgdata:/var/lib/postgresql/data

volumes:
  legalpermit_pgdata:
